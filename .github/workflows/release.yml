name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: Audit dependencies
        run: cargo audit

  build:
    needs: audit
    permissions:
      contents: read
      id-token: write  # required for cosign keyless OIDC signing

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: linear-mcp-darwin-arm64
            bin_suffix: ""
          - target: x86_64-apple-darwin
            runner: macos-14
            artifact: linear-mcp-darwin-x64
            bin_suffix: ""
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: linear-mcp-linux-x64
            bin_suffix: ""
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: linear-mcp-linux-arm64
            bin_suffix: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: linear-mcp-windows-x64.exe
            bin_suffix: ".exe"

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install zig + cargo-zigbuild (linux musl cross-compile)
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          pip3 install --user ziglang==0.13.0
          cargo install cargo-zigbuild --locked --version 0.22.2

      - name: Build (linux musl via zigbuild)
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!contains(matrix.target, 'linux-musl')"
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/linear-mcp${{ matrix.bin_suffix }} ${{ matrix.artifact }}

      - name: Install cargo-cyclonedx (SBOM)
        shell: bash
        run: cargo install cargo-cyclonedx --locked --version 0.5.9

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          cargo cyclonedx --format json --target ${{ matrix.target }} --override-filename ${{ matrix.artifact }}.sbom
          # cargo-cyclonedx writes `<override-filename>.json` into the package directory.
          # Locate and copy to workspace root with the expected release asset name.
          SBOM_SRC="$(find . -name '${{ matrix.artifact }}.sbom.json' -print -quit)"
          if [ -z "$SBOM_SRC" ]; then
            echo "::error::SBOM file not produced by cargo-cyclonedx"
            exit 1
          fi
          cp "$SBOM_SRC" ./${{ matrix.artifact }}.sbom.json
          ls -la ${{ matrix.artifact }}.sbom.json

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign binary with cosign (keyless)
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes \
            --output-signature ${{ matrix.artifact }}.sig \
            --output-certificate ${{ matrix.artifact }}.pem \
            ${{ matrix.artifact }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}-bundle
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sig
            ${{ matrix.artifact }}.pem
            ${{ matrix.artifact }}.sbom.json

  release:
    needs: build
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cp install.sh release/
          cp THIRD_PARTY_LICENSES.yaml release/
          # THIRD_PARTY_LICENSES.html is produced by a parallel agent; ship it if present.
          if [ -f THIRD_PARTY_LICENSES.html ]; then
            cp THIRD_PARTY_LICENSES.html release/
          else
            echo "::warning::THIRD_PARTY_LICENSES.html not found — skipping"
          fi
          cd release
          # Checksums over binaries only (not sigs/certs/SBOMs).
          # `SHA256SUMS` is the canonical name required by the release contract;
          # `checksums.txt` is retained for backwards compatibility with install.sh.
          BINARIES=$(ls linear-mcp-* | grep -Ev '\.(sig|pem|sbom\.json)$' | sort)
          if [ -z "$BINARIES" ]; then
            echo "::error::no binaries found for checksum generation"
            exit 1
          fi
          sha256sum $BINARIES > SHA256SUMS
          cp SHA256SUMS checksums.txt
          ls -la

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          files: release/*
          generate_release_notes: true
